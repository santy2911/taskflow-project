<!DOCTYPE html>
<html lang="es">


<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>


  <!-- Tailwind CSS via CDN — darkMode activado por clase -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css"/>


  <!-- Configuración de Tailwind: colores personalizados por prioridad -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#7a9cff',
            alta:   '#ff4757',
            media:  '#ffa502',
            baja:   '#2ed573',
          },
        },
      },
    }
  </script>


</head>


<body class="bg-gray-100 dark:bg-[#1a1a2e] text-gray-800 dark:text-white min-h-screen font-sans text-sm">


  <!-- ==============================
       CABECERA
       Título de la app y botón de tema
       ============================== -->
  <header class="bg-white dark:bg-[#243656] border-b border-gray-200 dark:border-[#2a4a7f] px-8 py-5">
    <div class="relative flex items-center justify-center max-w-[1200px] mx-auto">

      <h1 class="text-2xl font-bold">Mis Tareas</h1>


      <!-- btnTema: alterna entre modo claro y oscuro, gestionado desde app.js -->
      <button
        id="btnTema"
        aria-label="Activar modo oscuro"
        class="absolute right-0 text-xl w-9 h-9
               flex items-center justify-center
               rounded-lg bg-gray-100 dark:bg-[#1a1a2e]
               hover:bg-gray-200 dark:hover:bg-[#0f3460]
               transition-all duration-200">
        🌙
      </button>

    </div>
  </header>


  <!-- Layout principal: aside + main en fila -->
  <div class="flex max-w-[1200px] mx-auto px-6 min-h-[calc(100vh-61px)]">


    <!-- ==============================
         ASIDE — PANEL LATERAL
         Barra de progreso y filtros
         ============================== -->
    <aside class="w-[200px] shrink-0
                  bg-white dark:bg-[#243656]
                  border-2 border-[#7a9cff]
                  rounded-xl mt-5 mr-4 mb-5 p-5 h-fit">


      <!-- Barra de progreso: actualizada desde actualizarProgreso() en app.js -->
      <div class="mb-5">

        <div class="flex justify-between items-center mb-1.5">
          <span class="text-xs uppercase text-gray-400 dark:text-[#aaaaaa] tracking-wider">Progreso</span>

          <!-- porcentajeTexto: muestra el % numérico -->
          <span id="porcentajeTexto" class="text-xs font-bold text-[#7a9cff]">0%</span>
        </div>

        <div class="w-full h-2 bg-gray-200 dark:bg-[#1a1a2e] rounded-full overflow-hidden">

          <!-- barraProgreso: su width y color se modifican dinámicamente -->
          <div
            id="barraProgreso"
            class="h-full bg-[#7a9cff] rounded-full transition-all duration-500 ease-out"
            style="width: 0%">
          </div>

        </div>


        <!-- progresoTextoDetalle: muestra "X de Y tareas" -->
        <p id="progresoTextoDetalle"
           class="text-[10px] text-gray-400 dark:text-[#aaaaaa] mt-1 text-right">
          0 de 0 tareas
        </p>

      </div>


      <!-- Separador visual entre progreso y filtros -->
      <div class="border-t border-gray-200 dark:border-[#2a4a7f] mb-4"></div>


      <!-- Filtros: escuchados desde app.js con filtroPrioridad y filtroEstado -->
      <h3 class="text-xs uppercase text-gray-400 dark:text-[#aaaaaa] mb-3 tracking-wider">Filtros</h3>

      <div class="flex flex-col gap-4">


        <!-- Filtro por prioridad -->
        <div>
          <label class="text-xs text-gray-400 dark:text-[#aaaaaa] mb-1 block">Prioridad</label>
          <select
            id="filtroPrioridad"
            class="w-full px-3 py-2 rounded-lg
                   border border-gray-300 dark:border-[#2a4a7f]
                   bg-white dark:bg-[#1a1a2e]
                   text-gray-800 dark:text-white text-sm
                   outline-none cursor-pointer
                   focus:border-[#7a9cff] transition-all duration-200">
            <option value="todas">Todas</option>
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>
        </div>


        <!-- Filtro por estado -->
        <div>
          <label class="text-xs text-gray-400 dark:text-[#aaaaaa] mb-1 block">Estado</label>
          <select
            id="filtroEstado"
            class="w-full px-3 py-2 rounded-lg
                   border border-gray-300 dark:border-[#2a4a7f]
                   bg-white dark:bg-[#1a1a2e]
                   text-gray-800 dark:text-white text-sm
                   outline-none cursor-pointer
                   focus:border-[#7a9cff] transition-all duration-200">
            <option value="todas">Todas</option>
            <option value="pendientes">Pendientes</option>
            <option value="completadas">Completadas</option>
          </select>
        </div>


        <!-- btnCompletarTodo: alterna entre completar y desmarcar todas las tareas -->
        <button
          id="btnCompletarTodo"
          class="w-full py-2 rounded-lg
                 text-[#2ed573] border border-[#2ed573]
                 text-sm font-bold
                 hover:bg-[#2ed5731a] transition-all duration-200">
          Completar todas
        </button>


        <!-- btnEliminarTodo: elimina todas las tareas tras confirmación -->
        <button
          id="btnEliminarTodo"
          class="w-full py-2 rounded-lg
                 text-[#ff4757] border border-[#ff4757]
                 text-sm font-bold
                 hover:bg-[#ff47571a] transition-all duration-200">
          Eliminar tareas
        </button>


      </div>
    </aside>


    <!-- ==============================
         MAIN — CONTENIDO PRINCIPAL
         Formulario, buscador y secciones de tareas
         ============================== -->
    <main class="flex-1 py-6">


      <!-- Formulario para añadir tareas: gestionado por btnAnadir en app.js -->
      <div class="flex gap-2 mb-3 flex-wrap">


        <!-- inputTarea: nombre de la nueva tarea, soporta Enter para añadir -->
        <input
          type="text"
          id="inputTarea"
          placeholder="Nueva tarea"
          class="flex-1 px-3.5 py-2.5 rounded-lg
                 border border-gray-300 dark:border-[#2a4a7f]
                 bg-white dark:bg-[#243656]
                 text-gray-800 dark:text-white text-sm
                 placeholder-gray-400 dark:placeholder-[#aaaaaa]
                 outline-none
                 focus:border-[#7a9cff] hover:border-[#7a9cff]/50
                 transition-all duration-200"/>


        <!-- inputCategoria: categoría opcional, por defecto 'General' -->
        <input
          type="text"
          id="inputCategoria"
          placeholder="Categoría"
          class="flex-1 px-3.5 py-2.5 rounded-lg
                 border border-gray-300 dark:border-[#2a4a7f]
                 bg-white dark:bg-[#243656]
                 text-gray-800 dark:text-white text-sm
                 placeholder-gray-400 dark:placeholder-[#aaaaaa]
                 outline-none
                 focus:border-[#7a9cff] hover:border-[#7a9cff]/50
                 transition-all duration-200"/>


        <!-- selectPrioridad: define en qué sección se insertará la tarea -->
        <select
          id="selectPrioridad"
          class="px-3.5 py-2.5 rounded-lg
                 border border-gray-300 dark:border-[#2a4a7f]
                 bg-white dark:bg-[#243656]
                 text-gray-800 dark:text-white text-sm
                 outline-none cursor-pointer
                 focus:border-[#7a9cff] hover:border-[#7a9cff]/50
                 transition-all duration-200">
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>


        <button
          id="btnAnadir"
          class="px-6 py-2.5 rounded-lg
                 bg-[#7a9cff] text-[#1a1a2e]
                 text-sm font-bold
                 hover:opacity-85 active:scale-95
                 focus:outline-none focus:ring-2
                 focus:ring-[#7a9cff] focus:ring-offset-2
                 focus:ring-offset-[#1a1a2e]
                 transition-all duration-200">
          Añadir
        </button>


      </div>


      <!-- inputBusqueda: filtra tareas visibles en tiempo real por nombre -->
      <input
        type="text"
        id="inputBusqueda"
        placeholder="Buscar tarea"
        class="w-full px-3.5 py-2.5 rounded-lg
               border border-gray-300 dark:border-[#2a4a7f]
               bg-white dark:bg-[#243656]
               text-gray-800 dark:text-white text-sm
               placeholder-gray-400 dark:placeholder-[#aaaaaa]
               outline-none mb-6
               focus:border-[#7a9cff] hover:border-[#7a9cff]/50
               transition-all duration-200"/>


      <!-- ==============================
           SECCIONES DE TAREAS
           Las tareas se insertan dinámicamente dentro de cada sección
           según su prioridad. También son zonas de drop para drag & drop.
           ============================== -->

      <section id="seccion-alta" class="mb-7">
        <h2 class="text-xs uppercase text-gray-400 dark:text-[#aaaaaa] mb-2.5 tracking-wider">
          Prioridad Alta
        </h2>
      </section>


      <section id="seccion-media" class="mb-7">
        <h2 class="text-xs uppercase text-gray-400 dark:text-[#aaaaaa] mb-2.5 tracking-wider">
          Prioridad Media
        </h2>
      </section>


      <section id="seccion-baja" class="mb-7">
        <h2 class="text-xs uppercase text-gray-400 dark:text-[#aaaaaa] mb-2.5 tracking-wider">
          Prioridad Baja
        </h2>
      </section>


    </main>
  </div>


  <!-- Lógica de la aplicación -->
   
  <script src="app.js"></script>


</body>
</html>
