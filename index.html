<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Tareas</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-gray-100 dark:bg-[#1a1a2e] text-gray-800 dark:text-white min-h-screen font-sans">

  <!-- HEADER -->
  <header class="bg-white dark:bg-[#243656] border-b border-gray-200 dark:border-[#2a4a7f] px-8 py-5 text-center">
    <h1 class="text-[1.4rem] font-bold">Mis Tareas</h1>
  </header>

  <!-- CONTENEDOR -->
  <div class="flex max-w-[1200px] mx-auto px-6 min-h-[calc(100vh-61px)]">

    <!-- SIDEBAR -->
    <aside class="w-[200px] shrink-0 bg-white dark:bg-[#243656] border-2 border-[#7a9cff] rounded-[10px] mt-5 mr-4 mb-5 p-5 h-fit">
      <h3 class="text-[0.75rem] uppercase text-gray-400 dark:text-[#aaaaaa] mb-3 tracking-wider">Filtros</h3>
      <nav class="flex flex-col gap-1">
        <a href="#" class="active block no-underline text-gray-700 dark:text-white px-[10px] py-2 rounded-md text-[0.9rem]
                           hover:bg-gray-100 dark:hover:bg-[#0f3460] hover:text-[#7a9cff] transition-all duration-200"
           data-filtro="todas">Todas</a>
        <a href="#" class="block no-underline text-gray-700 dark:text-white px-[10px] py-2 rounded-md text-[0.9rem]
                           hover:bg-gray-100 dark:hover:bg-[#0f3460] hover:text-[#7a9cff] transition-all duration-200"
           data-filtro="alta">🔴Prioridad Alta</a>
        <a href="#" class="block no-underline text-gray-700 dark:text-white px-[10px] py-2 rounded-md text-[0.9rem]
                           hover:bg-gray-100 dark:hover:bg-[#0f3460] hover:text-[#7a9cff] transition-all duration-200"
           data-filtro="media">🟠Prioridad Media</a>
        <a href="#" class="block no-underline text-gray-700 dark:text-white px-[10px] py-2 rounded-md text-[0.9rem]
                           hover:bg-gray-100 dark:hover:bg-[#0f3460] hover:text-[#7a9cff] transition-all duration-200"
           data-filtro="baja">🟢Prioridad Baja</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 py-6">

      <!-- FORMULARIO -->
      <div class="flex gap-2 mb-3 flex-wrap">
        <input
          type="text" id="inputTarea" placeholder="Nueva tarea"
          class="flex-1 px-[14px] py-[10px] rounded-lg border border-gray-300 dark:border-[#2a4a7f] bg-white dark:bg-[#243656] text-gray-800 dark:text-white
                 text-[0.9rem] placeholder-gray-400 dark:placeholder-[#aaaaaa] outline-none
                 focus:border-[#7a9cff] hover:border-[#7a9cff]/50 transition-all duration-200"
        />
        <input
          type="text" id="inputCategoria" placeholder="Categoría"
          class="flex-1 px-[14px] py-[10px] rounded-lg border border-gray-300 dark:border-[#2a4a7f] bg-white dark:bg-[#243656] text-gray-800 dark:text-white
                 text-[0.9rem] placeholder-gray-400 dark:placeholder-[#aaaaaa] outline-none
                 focus:border-[#7a9cff] hover:border-[#7a9cff]/50 transition-all duration-200"
        />
        <select
          id="selectPrioridad"
          class="px-[14px] py-[10px] rounded-lg border border-gray-300 dark:border-[#2a4a7f] bg-white dark:bg-[#243656] text-gray-800 dark:text-white
                 text-[0.9rem] outline-none cursor-pointer
                 focus:border-[#7a9cff] hover:border-[#7a9cff]/50 transition-all duration-200"
        >
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
        <button
          id="btnAnadir"
          class="px-6 py-[10px] rounded-lg bg-[#7a9cff] text-[#1a1a2e] text-[0.9rem] font-bold
                 hover:opacity-85 active:scale-95
                 focus:outline-none focus:ring-2 focus:ring-[#7a9cff] focus:ring-offset-2 focus:ring-offset-[#1a1a2e]
                 transition-all duration-200"
        >
          Añadir
        </button>
      </div>

      <!-- BUSCADOR -->
      <input
        type="text" id="inputBusqueda" placeholder="Buscar tarea"
        class="w-full px-[14px] py-[10px] rounded-lg border border-gray-300 dark:border-[#2a4a7f] bg-white dark:bg-[#243656] text-gray-800 dark:text-white
               text-[0.9rem] placeholder-gray-400 dark:placeholder-[#aaaaaa] outline-none mb-6
               focus:border-[#7a9cff] hover:border-[#7a9cff]/50 transition-all duration-200"
      />

      <!-- SECCIONES -->
      <section id="seccion-alta" class="mb-7">
        <h2 class="text-[0.8rem] uppercase text-gray-400 dark:text-[#aaaaaa] mb-[10px] tracking-wider">Prioridad Alta</h2>
      </section>

      <section id="seccion-media" class="mb-7">
        <h2 class="text-[0.8rem] uppercase text-gray-400 dark:text-[#aaaaaa] mb-[10px] tracking-wider">Prioridad Media</h2>
      </section>

      <section id="seccion-baja" class="mb-7">
        <h2 class="text-[0.8rem] uppercase text-gray-400 dark:text-[#aaaaaa] mb-[10px] tracking-wider">Prioridad Baja</h2>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
