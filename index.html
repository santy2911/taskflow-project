<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Tareas</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>Mis Tareas</h1>
  </header>

  <div class="contenedor">

    <aside>
      <h3>Menú lateral</h3>
      <nav>
        <a href="#" class="active">Todas</a>
        <a href="#">Personal</a>
        <a href="#">Estudios</a>
        <a href="#">Videojuegos</a>
      </nav>
    </aside>

    <main>

      <div class="formulario">
        <input type="text" id="inputTarea" placeholder="Nueva tarea"/>
          <select id="selectCategoria">
            <option value="Personal">Personal</option>
            <option value="Estudios">Estudios</option>
            <option value="Videojuegos">Videojuegos</option>
          </select>

          <select id="selectPrioridad">
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>
            <button id="btnAnadir">Añadir</button>
            </div>

        <input type="text" id="inputBusqueda" placeholder="Buscar tarea"/>

      <section id="seccion-alta">
        <h2>Prioridad Alta</h2>
      </section>

        <section id="seccion-media">
          <h2>Prioridad Media</h2>
        </section>

        <section id="seccion-baja">
          <h2>Prioridad Baja</h2>
        </section>

    </main>
  </div>
        <script src="app.js"></script>
</body>
</html>
